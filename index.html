<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BountyRadar</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230d1117' stroke='%2358a6ff' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%2358a6ff' stroke-width='1.5' stroke-dasharray='4 3'/%3E%3Ccircle cx='32' cy='32' r='10' fill='none' stroke='%2358a6ff' stroke-width='1.5'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%233fb950'/%3E%3Cpath d='M24 8 Q16 32 24 56' fill='none' stroke='%23d29922' stroke-width='1.5' stroke-dasharray='3 2' opacity='.6'/%3E%3Cpath d='M40 8 Q48 32 40 56' fill='none' stroke='%23d29922' stroke-width='1.5' stroke-dasharray='3 2' opacity='.6'/%3E%3Ctext x='32' y='60' text-anchor='middle' font-size='6' fill='%23444' font-family='monospace'%3ERADAR%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
  --muted: #8b949e; --green: #3fb950; --red: #f85149; --orange: #d29922;
  --blue: #58a6ff; --purple: #bc8cff; --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; -webkit-text-size-adjust:100%; }

header { background:var(--card); border-bottom:1px solid var(--border); padding:12px; display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
header h1 { font-size:17px; display:flex; align-items:center; gap:5px; }
header .stats-row { display:flex; flex-wrap:wrap; gap:4px 12px; font-size:11px; color:var(--muted); margin-left:auto; }
header .stats-row strong { color:var(--text); }

.controls { padding:8px 12px; background:var(--card); border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:6px; }
.controls input,.controls select { background:#0d1117; border:1px solid var(--border); color:var(--text); padding:7px 9px; border-radius:var(--radius); font-size:13px; outline:none; -webkit-appearance:none; appearance:none; }
.controls input:focus,.controls select:focus { border-color:var(--blue); }
.controls .search-wrap { flex:1 1 100%; order:-1; }
.controls .search-wrap input { width:100%; }
.controls select { flex:1 1 calc(50% - 3px); min-width:0; }

.grid { display:grid; grid-template-columns:1fr; gap:8px; padding:8px 12px; max-width:100%; }

.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; }
.card .meta { display:flex; align-items:flex-start; gap:6px; margin-bottom:5px; }
.card .author { display:flex; align-items:center; gap:6px; min-width:0; flex:1; }
.card .avatar { width:26px; height:26px; min-width:26px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.card .name { font-weight:600; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .handle { color:var(--muted); font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .score { font-size:10px; font-weight:600; padding:1px 7px; border-radius:10px; white-space:nowrap; flex-shrink:0; margin-top:2px; }
.score-high { background:#1a3a2a; color:var(--green); }
.score-med { background:#3a2a1a; color:var(--orange); }
.score-low { background:#2a1a1a; color:var(--red); }
.card .text { font-size:13px; margin:4px 0; word-break:break-word; max-height:60px; overflow:hidden; line-height:1.4; }
.card .text.open { max-height:none; }
.card .toggle-btn { background:none; border:none; color:var(--blue); cursor:pointer; font-size:11px; padding:0; }
.card .tags { display:flex; flex-wrap:wrap; gap:3px; margin:4px 0; }
.card .tag { font-size:10px; padding:1px 6px; border-radius:10px; background:#1f2937; color:var(--blue); }
.card .tag.cve { background:#1a1a2e; color:var(--red); }
.card .tag.award { background:#1a2e1a; color:var(--green); }
.card .links-row { margin:4px 0; display:flex; flex-wrap:wrap; gap:3px; }
.card .links-row a { color:var(--blue); font-size:11px; text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.card .links-row a:hover { text-decoration:underline; }
.card .footer { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:10px; color:var(--muted); border-top:1px solid var(--border); padding-top:4px; }
.card .footer span { display:flex; align-items:center; gap:2px; }
.card .footer .timestamp { margin-left:auto; }
.card .media { margin-top:4px; }
.card .media img { width:100%; max-height:160px; border-radius:4px; cursor:pointer; object-fit:cover; }

.charts-row { display:grid; grid-template-columns:1fr; gap:8px; padding:0 12px 8px; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:10px; }
.chart-card h3 { font-size:11px; margin-bottom:6px; color:var(--muted); }
.chart-card canvas { max-height:180px; width:100% !important; height:auto !important; }

#status-bar { background:var(--card); border-bottom:1px solid var(--border); padding:5px 12px; font-size:10px; color:var(--muted); display:flex; flex-wrap:wrap; gap:4px; justify-content:space-between; }
#status-bar .err { color:var(--red); }

#loading { text-align:center; padding:30px 12px; color:var(--muted); font-size:14px; }
#loading .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

@media(min-width:420px) {
  header { padding:12px 14px; gap:6px; }
  header h1 { font-size:18px; }
  header .stats-row { gap:4px 14px; font-size:11px; }
  .controls { padding:8px 14px; gap:6px; }
  .controls select { flex:1 1 auto; }
  .grid { padding:8px 14px; gap:8px; }
  .card { padding:10px 14px; }
  .charts-row { padding:0 14px 8px; }
  #status-bar { padding:5px 14px; }
}

@media(min-width:520px) {
  header { padding:14px 16px; gap:8px; }
  header h1 { font-size:18px; }
  header .stats-row { font-size:11px; gap:10px; }
  .controls { padding:8px 16px; gap:8px; }
  .controls .search-wrap { flex:1 1 auto; order:0; }
  .controls .search-wrap input { width:100%; min-width:140px; }
  .controls select { flex:0 1 auto; }
  .grid { padding:8px 16px; gap:10px; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }
  .card { padding:12px; }
  .card .avatar { width:28px; height:28px; min-width:28px; }
  .charts-row { padding:0 16px 8px; gap:10px; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }
  .chart-card canvas { max-height:200px; }
  #status-bar { padding:5px 16px; font-size:10px; }
}

@media(min-width:768px) {
  header { padding:16px 20px; gap:10px; }
  header h1 { font-size:20px; }
  header .stats-row { gap:16px; font-size:12px; }
  .controls { padding:10px 20px; gap:10px; }
  .controls input,.controls select { font-size:13px; padding:7px 10px; }
  .controls .search-wrap input { min-width:160px; }
  .grid { padding:12px 20px; gap:12px; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); }
  .card { padding:14px; }
  .card:hover { border-color:var(--blue); }
  .card .avatar { width:32px; height:32px; min-width:32px; font-size:12px; }
  .card .name { font-size:13px; }
  .card .handle { font-size:11px; }
  .card .score { font-size:12px; padding:2px 8px; }
  .card .text { font-size:14px; }
  .card .tag { font-size:10px; padding:2px 7px; }
  .card .footer { font-size:11px; gap:12px; }
  .card .media img { max-height:180px; }
  .charts-row { grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); padding:0 20px 12px; gap:12px; }
  .chart-card { padding:12px; }
  .chart-card h3 { font-size:13px; }
  .chart-card canvas { max-height:220px; }
  #status-bar { padding:6px 20px; font-size:11px; }
  #loading { padding:50px 20px; font-size:16px; }
  #loading .spinner { width:20px; height:20px; border-width:2px; }
}

@media(min-width:1024px) {
  header { padding:18px 24px; }
  header h1 { font-size:22px; }
  header .stats-row { gap:20px; font-size:13px; }
  .controls { padding:14px 24px; gap:12px; }
  .controls input,.controls select { font-size:13px; padding:8px 12px; }
  .controls .search-wrap input { min-width:200px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); padding:16px 24px; gap:16px; }
  .card { padding:16px; }
  .card .avatar { width:36px; height:36px; min-width:36px; font-size:14px; }
  .card .name { font-size:14px; }
  .card .handle { font-size:12px; }
  .card .score { font-size:13px; padding:2px 10px; }
  .card .text { font-size:14px; }
  .card .tag { font-size:11px; padding:2px 8px; }
  .card .footer { font-size:12px; gap:16px; }
  .card .media img { max-height:200px; }
  .charts-row { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); padding:0 24px 16px; gap:16px; }
  .chart-card { padding:16px; }
  .chart-card h3 { font-size:14px; }
  .chart-card canvas { max-height:250px; }
  #status-bar { padding:8px 24px; font-size:12px; }
  #loading { padding:60px; font-size:18px; }
  #loading .spinner { width:24px; height:24px; border-width:3px; }
}
</style>
</head>
<body>

<header>
  <h1>&#128200; Bounty<span>Radar</span></h1>
  <div class="stats-row" id="header-stats">
    <span>Tweets: <strong id="total-count">0</strong></span>
    <span>CVEs: <strong id="cve-count">0</strong></span>
    <span>Awards: <strong id="award-count">0</strong></span>
    <span>Authors: <strong id="author-count">0</strong></span>
  </div>
</header>

<div id="status-bar">
  <div>Last updated: <span id="last-updated">—</span></div>
  <div>Showing <strong id="showing-count">0</strong> / <span id="total-showing">0</span> tweets</div>
</div>

<div class="controls">
  <div class="search-wrap"><input type="text" id="search" placeholder="Search text, author, CVE, hashtag..." oninput="fetchAndRender()"></div>
  <select id="sort" onchange="fetchAndRender()">
    <option value="date" selected>Sort: Newest</option>
    <option value="score">Sort: Confidence</option>
    <option value="likes">Sort: Most Liked</option>
    <option value="award">Sort: Highest Award</option>
  </select>
  <select id="filter-cve" onchange="fetchAndRender()">
    <option value="all">All Tweets</option>
    <option value="has-cve">Has CVE</option>
  </select>
  <select id="filter-award" onchange="fetchAndRender()">
    <option value="all">Any Award</option>
    <option value="has-award">Has Award</option>
  </select>
  <select id="filter-days" onchange="fetchAndRender()">
    <option value="all">All Time</option>
    <option value="1">Last 24 hours</option>
    <option value="3">Last 3 days</option>
    <option value="7">Last 7 days</option>
    <option value="30">Last 30 days</option>
  </select>
</div>

<div class="charts-row" id="charts"><div class="chart-card"><h3>&#128202; Score Distribution</h3><canvas id="chart-score"></canvas></div><div class="chart-card"><h3>&#127991; Top Hashtags</h3><canvas id="chart-hashtag"></canvas></div><div class="chart-card"><h3>&#128202; Tweets Over Time</h3><canvas id="chart-time"></canvas></div></div>

<div id="loading"><span class="spinner"></span>Loading tweets...</div>
<div class="grid" id="tweet-grid"></div>

<script>
var allTweets = [];
var charts = {};

function fetchAndRender() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tweet-grid').innerHTML = '';

  fetch('data/tweets.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      document.getElementById('loading').style.display = 'none';
      allTweets = data;
      document.getElementById('last-updated').textContent = new Date().toLocaleString();

      var q = document.getElementById('search').value.trim().toLowerCase();
      var cveF = document.getElementById('filter-cve').value;
      var awardF = document.getElementById('filter-award').value;
      var daysF = document.getElementById('filter-days').value;
      var sort = document.getElementById('sort').value;
      var cutoff = daysF === 'all' ? 0 : Date.now() - parseInt(daysF) * 86400000;

      var filtered = allTweets.filter(function(t) {
        if (q && (t.text||'').toLowerCase().indexOf(q)===-1 && (t.author_handle||'').toLowerCase().indexOf(q)===-1 && !(t.hashtags||[]).some(function(h){return h.toLowerCase().indexOf(q)!==-1}) && !(t.cve_ids||[]).some(function(c){return c.toLowerCase().indexOf(q)!==-1})) return false;
        if (cveF === 'has-cve' && (!t.cve_ids||!t.cve_ids.length)) return false;
        if (awardF === 'has-award' && !t.award_amount) return false;
        if (daysF !== 'all' && new Date(t.timestamp).getTime() < cutoff) return false;
        return true;
      });

      filtered.sort(function(a,b) {
        switch(sort) {
          case 'date': return new Date(b.timestamp)-new Date(a.timestamp);
          case 'likes': return (b.like_count||0)-(a.like_count||0);
          case 'award': return (b.award_amount||0)-(a.award_amount||0);
          default: return (b.confidence_score||0)-(a.confidence_score||0);
        }
      });

      document.getElementById('total-count').textContent = allTweets.length;
      document.getElementById('total-showing').textContent = allTweets.length;
      document.getElementById('showing-count').textContent = filtered.length;
      document.getElementById('cve-count').textContent = allTweets.filter(function(t){return t.cve_ids&&t.cve_ids.length;}).length;
      document.getElementById('award-count').textContent = allTweets.filter(function(t){return t.award_amount;}).length;
      document.getElementById('author-count').textContent = new Set(allTweets.map(function(t){return t.author_handle;})).size;
      renderTweets(filtered);
      initCharts(filtered);
    })
    .catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('tweet-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;padding:40px 16px;color:var(--red);">' +
        '<h2>Error loading tweets</h2>' +
        '<p style="color:var(--muted)">Run <code>python cli.py run --once</code> first to fetch tweets.</p>' +
        '<p style="font-size:12px;color:var(--muted)">' + err.message + '</p></div>';
    });
}

function renderTweets(tweets) {
  var html = '';
  for (var i = 0; i < tweets.length; i++) {
    html += renderCard(tweets[i]);
  }
  document.getElementById('tweet-grid').innerHTML = html;

  var toggles = document.querySelectorAll('.toggle-btn');
  for (var j = 0; j < toggles.length; j++) {
    (function(btn) {
      btn.onclick = function() {
        var txt = this.previousElementSibling;
        if (txt) { txt.classList.toggle('open'); this.textContent = txt.classList.contains('open') ? 'Show less' : 'Show more'; }
      };
    })(toggles[j]);
  }
}

function renderCard(t) {
  var score = t.confidence_score || 0;
  var scoreCls = score >= 0.3 ? 'score-high' : score >= 0.15 ? 'score-med' : 'score-low';
  var txt = (t.text || '').replace(/https:\/\/t\.co\/\S+/g, '').trim();
  var needsExpand = txt.length > 150;
  var letter = (t.author_display_name || t.author_handle || '?').charAt(0).toUpperCase();
  var tweetUrl = 'https://x.com/' + t.author_handle + '/status/' + t.tweet_id;
  var ago = timeAgo(t.timestamp);

  var tags = '';
  if (t.hashtags) { for (var h = 0; h < t.hashtags.length; h++) { tags += '<span class="tag">#' + esc(t.hashtags[h]) + '</span>'; } }
  if (t.cve_ids) { for (var c = 0; c < t.cve_ids.length; c++) { tags += '<span class="tag cve">' + esc(t.cve_ids[c]) + '</span>'; } }
  if (t.award_amount && t.award_amount >= 100) {
    tags += '<span class="tag award">$' + Number(t.award_amount).toLocaleString('en-US',{minimumFractionDigits:0}) + '</span>';
  }

  var links = '';
  var clean = [];
  if (t.links) { for (var L = 0; L < t.links.length; L++) { if (t.links[L] && t.links[L].indexOf('t.co/') === -1) clean.push(t.links[L]); } }
  if (clean.length > 0) {
    links = '<div class="links-row">';
    for (var L2 = 0; L2 < Math.min(clean.length, 3); L2++) {
      var domain = clean[L2].replace('https://','').replace('http://','').split('/')[0];
      links += '<a href="' + esc(clean[L2]) + '" target="_blank">&#128279; ' + esc(domain) + '</a>';
    }
    links += '</div>';
  }

  var media = '';
  if (t.media_urls && t.media_urls.length) {
    var img = t.media_urls[0].replace('&name=small','&name=medium').replace('&name=360x360','&name=medium');
    media = '<div class="media"><a href="' + tweetUrl + '" target="_blank"><img src="' + img + '" loading="lazy"></a></div>';
  }

  return '<div class="card">' +
    '<div class="meta"><div class="author"><div class="avatar">' + letter + '</div><div><div class="name">' + esc(t.author_display_name || t.author_handle) + '</div><div class="handle">@' + esc(t.author_handle) + '</div></div></div><div class="score ' + scoreCls + '">' + score.toFixed(2) + '</div></div>' +
    '<div class="text' + (needsExpand ? '' : ' open') + '">' + esc(txt) + '</div>' +
    (needsExpand ? '<button class="toggle-btn">Show more</button>' : '') +
    '<div class="tags">' + tags + '</div>' +
    links +
    media +
    '<div class="footer"><span>&#10084;&#65039; ' + (t.like_count||0) + '</span><span>&#128256; ' + (t.retweet_count||0) + '</span><span>&#128172; ' + (t.reply_count||0) + '</span><span class="timestamp">' + ago + '</span><span style="margin-left:auto"><a href="' + tweetUrl + '" target="_blank" style="color:var(--blue);text-decoration:none;font-size:12px;">&#8599; View</a></span></div>' +
    '</div>';
}

function timeAgo(ts) {
  var diff = Date.now() - new Date(ts).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  var hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  return Math.floor(hours / 24) + 'd ago';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initCharts(tweets) {
  if (typeof Chart === 'undefined') { document.getElementById('charts').style.display = 'none'; return; }

  try {
    var bins = [0,0,0,0,0];
    tweets.forEach(function(t) {
      var s = t.confidence_score || 0;
      if (s < 0.1) bins[0]++; else if (s < 0.2) bins[1]++; else if (s < 0.3) bins[2]++; else if (s < 0.4) bins[3]++; else bins[4]++;
    });
    if (charts.score) charts.score.destroy();
    charts.score = new Chart(document.getElementById('chart-score'), {
      type:'bar', data:{ labels:['0-0.1','0.1-0.2','0.2-0.3','0.3-0.4','0.4+'], datasets:[{ data:bins, backgroundColor:['#f85149','#d29922','#58a6ff','#3fb950','#bc8cff'], borderRadius:4 }] },
      options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{display:false} }, scales:{ y:{beginAtZero:true,ticks:{stepSize:1}} } }
    });
  } catch(e) {}

  try {
    var hc = {};
    tweets.forEach(function(t) { if (t.hashtags) t.hashtags.forEach(function(h) { hc[h] = (hc[h]||0) + 1; }); });
    var sorted = Object.entries(hc).sort(function(a,b){ return b[1]-a[1]; }).slice(0,10);
    if (sorted.length) {
      if (charts.hashtag) charts.hashtag.destroy();
      charts.hashtag = new Chart(document.getElementById('chart-hashtag'), {
        type:'doughnut', data:{ labels:sorted.map(function(s){return '#'+s[0];}), datasets:[{ data:sorted.map(function(s){return s[1];}), backgroundColor:['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#79c0ff','#56d364','#e3b341','#ff7b72','#d2a8ff'] }] },
        options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{position:'right',labels:{color:'#8b949e',font:{size:11}}} } }
      });
    }
  } catch(e) {}

  try {
    var tc = {};
    tweets.forEach(function(t) { if (t.timestamp) { var d = t.timestamp.slice(0,10); tc[d] = (tc[d]||0) + 1; } });
    var days = Object.entries(tc).sort(function(a,b){return a[0].localeCompare(b[0]);});
    if (days.length) {
      if (charts.time) charts.time.destroy();
      charts.time = new Chart(document.getElementById('chart-time'), {
        type:'line', data:{ labels:days.map(function(s){return s[0].slice(5);}), datasets:[{ data:days.map(function(s){return s[1];}), borderColor:'#58a6ff', backgroundColor:'rgba(88,166,255,0.1)', fill:true, tension:0.3, pointRadius:3 }] },
        options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{display:false} }, scales:{ y:{beginAtZero:true,ticks:{stepSize:1}} } }
      });
    }
  } catch(e) {}
}

fetchAndRender();
</script>
</body>
</html>
