name: Scrape

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python cli.py run --once
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}

      - name: Commit & push JSON
        run: |
          git config user.name "bountybot"
          git config user.email "bot@bountyradar.dev"
          git add data/tweets.json
          git diff --staged --quiet || git commit -m "auto: update tweets [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push
